<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FingerGo</title>
        <link rel="stylesheet" href="styles/main.css" />
        <link rel="stylesheet" href="styles/modals.css" />
        <link rel="stylesheet" href="styles/keyboard.css" />
        <link rel="stylesheet" href="styles/library.css" />
        <link id="theme-css" rel="stylesheet" href="styles/theme-dark.css" />
    </head>
    <body class="theme-dark">
        <div id="app" class="theme-dark">
            <div id="top-action-bar" role="region" aria-label="Quick actions">
                <button
                    id="theme-toggle"
                    class="top-action-button"
                    aria-label="Toggle theme"
                    title="Toggle theme"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                    </svg>
                </button>
                <button
                    id="color-settings"
                    class="top-action-button"
                    aria-label="Color settings"
                    title="Customize colors"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
                        <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
                        <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" />
                        <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
                        <path
                            d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"
                        />
                    </svg>
                </button>
                <button
                    id="zen-toggle"
                    class="top-action-button"
                    aria-label="Toggle Zen mode"
                    title="Toggle Zen mode (Ctrl+Alt+Z)"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M3 7V5a2 2 0 0 1 2-2h2" />
                        <path d="M17 3h2a2 2 0 0 1 2 2v2" />
                        <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
                        <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
                    </svg>
                </button>
                <button
                    id="stats-toggle"
                    class="top-action-button"
                    aria-label="Toggle stats bar"
                    title="Toggle stats bar (Ctrl+Alt+S)"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <line x1="18" x2="18" y1="20" y2="10" />
                        <line x1="12" x2="12" y1="20" y2="4" />
                        <line x1="6" x2="6" y1="20" y2="14" />
                    </svg>
                </button>
                <button
                    id="keyboard-toggle"
                    class="top-action-button"
                    aria-label="Toggle keyboard"
                    title="Toggle keyboard (Ctrl+Alt+K)"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <rect width="20" height="16" x="2" y="4" rx="2" ry="2" />
                        <path d="M6 8h.001" />
                        <path d="M10 8h.001" />
                        <path d="M14 8h.001" />
                        <path d="M18 8h.001" />
                        <path d="M8 12h.001" />
                        <path d="M12 12h.001" />
                        <path d="M16 12h.001" />
                        <path d="M7 16h10" />
                    </svg>
                </button>
                <button
                    id="strict-mode-toggle"
                    class="top-action-button"
                    aria-label="Toggle strict mode"
                    title="Toggle strict mode (require backspace for errors)"
                    aria-pressed="false"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="12" cy="12" r="10" />
                        <line x1="22" x2="18" y1="12" y2="12" />
                        <line x1="6" x2="2" y1="12" y2="12" />
                        <line x1="12" x2="12" y1="6" y2="2" />
                        <line x1="12" x2="12" y1="22" y2="18" />
                    </svg>
                </button>
                <button
                    id="reset-session"
                    class="top-action-button"
                    aria-label="Reset session"
                    title="Reset session (Ctrl+Alt+R)"
                    type="button"
                >
                    ↻
                </button>
            </div>
            <!-- Text Display Area -->
            <section id="text-area">
                <div id="text-display"></div>
                <textarea
                    id="text-input"
                    aria-label="Typing input"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                ></textarea>
            </section>

            <!-- Statistics Bar (moved out of #keyboard to keep visible) -->
            <section id="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">WPM</span>
                    <span class="stat-value" id="wpm">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">CPM</span>
                    <span class="stat-value" id="cpm">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Accuracy</span>
                    <span class="stat-value" id="accuracy">100%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Time</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
            </section>

            <!-- Keyboard Section -->
            <section id="keyboard-section">
                <div id="keyboard">
                    <!-- Keyboard will be generated by JavaScript -->
                </div>
            </section>

            <!-- Library Controls (right edge) -->
            <div id="library-controls" role="region" aria-label="Library controls">
                <div id="zoom-controls">
                    <button
                        id="zoom-out"
                        aria-label="Decrease text size"
                        title="Decrease text size (Ctrl+−)"
                        type="button"
                    >
                        −
                    </button>
                    <button
                        id="zoom-in"
                        aria-label="Increase text size"
                        title="Increase text size (Ctrl++)"
                        type="button"
                    >
                        +
                    </button>
                </div>
                <button
                    id="library-toggle"
                    aria-label="Library"
                    title="Library (Ctrl+Alt+L)"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                    </svg>
                </button>
                <button
                    id="text-add"
                    aria-label="Add New"
                    title="Add New (Ctrl+Alt+N)"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"
                        />
                        <line x1="12" x2="12" y1="10" y2="16" />
                        <line x1="9" x2="15" y1="13" y2="13" />
                    </svg>
                </button>
                <button
                    id="layout-toggle"
                    aria-label="Keyboard layout"
                    title="Keyboard layout (Ctrl+,)"
                    type="button"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="m5 8 6 6" />
                        <path d="m4 14 6-6 2-3" />
                        <path d="M2 5h12" />
                        <path d="M7 2h1" />
                        <path d="m22 22-5-10-5 10" />
                        <path d="M14 18h6" />
                    </svg>
                </button>
            </div>

            <!-- Library Sidebar (slide-in panel) -->
            <aside id="library-sidebar" aria-label="Library">
                <header class="sidebar-header">
                    <h3>Library</h3>
                    <button id="sidebar-close" aria-label="Close sidebar">✕</button>
                </header>
                <div class="sidebar-content">
                    <nav id="category-tree">
                        <!-- Generated by library.js -->
                    </nav>
                    <div id="text-list">
                        <!-- Generated by library.js -->
                    </div>
                </div>
            </aside>

            <!-- GitHub Link -->
            <a id="github-link" href="#" aria-label="View on GitHub" title="View on GitHub">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
                    />
                </svg>
            </a>

            <!-- Modal Overlay -->
            <div id="modal-overlay" class="modal-hidden">
                <div id="modal-container">
                    <div id="modal-header">
                        <h2 id="modal-title"></h2>
                        <button id="modal-close" aria-label="Close modal" tabindex="-1">✕</button>
                    </div>
                    <div id="modal-content">
                        <!-- Dynamic content injected by modals.js -->
                    </div>
                </div>
            </div>
        </div>

        <script src="wailsjs/runtime/runtime.js"></script>
        <!-- Event system: must load first as all modules depend on it -->
        <script src="js/events.js"></script>
        <!-- Constants: application-wide shared values -->
        <script src="js/constants.js"></script>
        <!-- Utility functions: key normalization (used by keyboard, typing, app) -->
        <script src="js/utils.js"></script>
        <!-- Keyboard layouts: load individual layouts before registry -->
        <script src="js/layouts/en-qwerty.js"></script>
        <script src="js/layouts/en-dvorak.js"></script>
        <script src="js/layouts/ru-jcuken.js"></script>
        <script src="js/layouts/de-qwertz.js"></script>
        <script src="js/layouts/fr-azerty.js"></script>
        <script src="js/layouts.js"></script>
        <script src="js/keyboard.js"></script>
        <script src="js/typing.js"></script>
        <!-- Modal system: core first, then type-specific renderers -->
        <script src="js/modals/core.js"></script>
        <script src="js/modals/session-summary.js"></script>
        <script src="js/modals/color-settings.js"></script>
        <script src="js/modals/text-editor.js"></script>
        <script src="js/modals/error.js"></script>
        <script src="js/modals/settings.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/stats.js"></script>
        <script src="js/colors.js"></script>
        <!-- Settings, session, library, shortcuts: modular architecture -->
        <script src="js/settings.js"></script>
        <script src="js/session.js"></script>
        <script src="js/library.js"></script>
        <script src="js/shortcuts.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
